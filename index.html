<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sellers Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>    
<div class="dashboard-container">

    <form>
            <h1>Sellers Dashboard</h1>

        <label for="price">Selling Price:</label>
        <input type="number" id="price" name="selling_price">
        <label for="name">Product Name:</label>
        <input type="text" id="name" name="product_name">
        <label for="category">Category:</label>
        <select id="category" name="category">
            <option value="electronics">Electronics Item</option>
            <option value="food">Food Item</option>
            <option value="skin">Skin Care Item</option>
        </select>
        <button type="submit">Add Item</button>
    </form>
    
    <div class="right-section">
    <h2>Electronics Items</h2>
    <ul id="electronics"></ul>

    <h2>Food Items</h2>
    <ul id="food"></ul>

    <h2>Skin Care Items</h2>
    <ul id="skin"></ul>
</div>
</div>

    <script src="script.js"></script>
</body>
</html>
